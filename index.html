<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>夕やけ堂 レジスター</title>
<style>
  /* Wii UのGamePad（横854px / 縦480px）に最適化 */
  body {
    font-family: "Hiragino Kaku Gothic ProN", "ヒラギノ角ゴ ProN W3", Meiryo, sans-serif;
    margin: 0;
    padding: 5px;
    background-color: #f7ede2; /* レトロな暖かい紙の色 */
    color: #4a3728; /* レトロな濃い茶色 */
    font-size: 14px;
  }
  h1 {
    font-size: 18px;
    margin: 4px 0;
    text-align: center;
    color: #8c2f1b; /* 駄菓子屋ののれん風の赤茶色 */
    border-bottom: 2px dashed #8c2f1b;
    padding-bottom: 3px;
  }
  .container {
    display: flex;
    max-width: 840px;
    margin: 0 auto;
    gap: 8px;
  }
  /* 左側：商品選択・テンキー */
  .left-panel {
    flex: 1.3;
  }
  /* 右側：計算結果・レシート表示 */
  .right-panel {
    flex: 1;
    background-color: #fffaf0;
    border: 2px dashed #8c2f1b;
    padding: 8px;
    border-radius: 4px;
  }
  /* 商品ボタンエリア */
  .items-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
    margin-bottom: 8px;
  }
  .btn-item {
    background-color: #fbd6a6; /* 駄菓子のパッケージ風 */
    border: 1px solid #d4a373;
    border-radius: 4px;
    padding: 10px 2px;
    font-size: 13px;
    font-weight: bold;
    color: #5c3d2e;
    cursor: pointer;
    text-align: center;
  }
  .btn-item:active {
    background-color: #e29578;
  }
  /* 電卓風テンキー */
  .keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
  }
  .btn-key {
    background-color: #f4f1de;
    border: 1px solid #cbd5e1;
    color: #5c3d2e;
    padding: 12px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 4px;
    cursor: pointer;
  }
  .btn-key:active {
    background-color: #e0dcc5;
  }
  .btn-action {
    background-color: #f28482;
    border-color: #f28482;
    color: #fff;
  }
  .btn-action:active {
    background-color: #e56b6f;
  }
  /* レシート表示部 */
  .receipt-box {
    background: #fffff6;
    border: 1px solid #d4a373;
    padding: 6px;
    min-height: 200px;
    max-height: 310px;
    overflow-y: auto;
    font-family: monospace;
    font-size: 12px;
    white-space: pre-wrap;
    color: #333;
  }
  /* 商品マスタ編集エリア（最下部） */
  .master-panel {
    margin-top: 10px;
    background: #fdf0d5;
    padding: 8px;
    border-radius: 4px;
    border: 1px solid #d4a373;
  }
  .master-title {
    font-size: 13px;
    font-weight: bold;
    margin-bottom: 5px;
    color: #6f1d1b;
  }
  .master-inputs input {
    font-size: 12px;
    padding: 4px;
    width: 25%;
    margin-right: 5px;
    border: 1px solid #d4a373;
    border-radius: 3px;
  }
  .btn-sub {
    font-size: 11px;
    padding: 4px 8px;
    background: #70e000;
    color: #38b000;
    background-color: #d4a373;
    color: white;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    font-weight: bold;
  }
  /* リスト削除用 */
  .master-list {
    margin-top: 5px;
    font-size: 11px;
    max-height: 80px;
    overflow-y: auto;
    background: #fff;
    padding: 4px;
    border: 1px solid #d4a373;
  }
  .master-item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 2px;
    border-bottom: 1px dotted #ccc;
  }
  .btn-del {
    background: #e74c3c;
    color: white;
    border: none;
    font-size: 9px;
    padding: 1px 4px;
    border-radius: 2px;
  }
</style>
</head>
<body>

<h1>🪀 駄菓子屋「夕やけ堂」のレジ</h1>

<div class="container">
  
  <!-- 左：入力パネル -->
  <div class="left-panel">
    <!-- 商品ボタン -->
    <div class="items-grid" id="items-grid"></div>
    
    <!-- 金額入力用キーパッド -->
    <div class="keypad">
      <button class="btn-key" onclick="pressNum(7)">7</button>
      <button class="btn-key" onclick="pressNum(8)">8</button>
      <button class="btn-key" onclick="pressNum(9)">9</button>
      <button class="btn-key" onclick="pressNum(4)">4</button>
      <button class="btn-key" onclick="pressNum(5)">5</button>
      <button class="btn-key" onclick="pressNum(6)">6</button>
      <button class="btn-key" onclick="pressNum(1)">1</button>
      <button class="btn-key" onclick="pressNum(2)">2</button>
      <button class="btn-key" onclick="pressNum(3)">3</button>
      <button class="btn-key btn-action" onclick="clearCart()">とりけし</button>
      <button class="btn-key" onclick="pressNum(0)">0</button>
      <button class="btn-key btn-action" style="background-color: #d4a373; border-color: #c29262;" onclick="calcTotal()">会計(お預り)</button>
    </div>
  </div>
  
  <!-- 右：レシート・小計パネル -->
  <div class="right-panel">
    <div style="font-weight: bold; margin-bottom: 4px; color: #5c3d2e;">だしたお金: <span id="input-cash" style="color:#d94e34; font-size:18px;">0</span> 円</div>
    <div class="receipt-box" id="receipt">いらっしゃい！<br>ほしい駄菓子をタップしてね。</div>
  </div>

</div>

<!-- 下：商品登録（駄菓子追加） -->
<div class="master-panel">
  <div class="master-title">👵 新しいお菓子を仕入れる（商品登録）</div>
  <div class="master-inputs">
    <input type="text" id="new-name" placeholder="お菓子のなまえ">
    <input type="number" id="new-price" placeholder="値段 (円)">
    <button class="btn-sub" onclick="addItem()">お菓子を追加</button>
  </div>
  <div class="master-list" id="master-list"></div>
</div>

<script>
  // 駄菓子屋風の初期お菓子データ（Wii U用超軽量配列）
  var products = [
    { name: "30円ヨーグルト", price: 30 },
    { name: "めんたいコーン", price: 10 },
    { name: "コーララムネ", price: 30 },
    { name: "串カツ（1本）", price: 40 },
    { name: "イカすする板", price: 50 },
    { name: "きなこ棒", price: 10 },
    { name: "チョコ駄菓子", price: 30 },
    { name: "さくら餅さくらんぼ", price: 40 },
    { name: "ラムネ瓶ジュース", price: 100 }
  ];

  var cart = [];
  var currentInputCash = ""; // テンキー入力

  function renderAll() {
    // 1. 商品ボタンの生成
    var gridHtml = "";
    for (var i = 0; i < products.length; i++) {
      gridHtml += '<button class="btn-item" onclick="addToCart(' + i + ')">' + 
                  products[i].name + '<br>' + products[i].price + '円</button>';
    }
    document.getElementById("items-grid").innerHTML = gridHtml;

    // 2. マスタ編集リストの生成
    var listHtml = "";
    for (var i = 0; i < products.length; i++) {
      listHtml += '<div class="master-item"><span>' + products[i].name + ' (' + products[i].price + '円)</span>' +
                  '<button class="btn-del" onclick="deleteItem(' + i + ')">やめる</button></div>';
    }
    document.getElementById("master-list").innerHTML = listHtml;

    updateReceipt();
  }

  // カートに商品を追加
  function addToCart(index) {
    var p = products[index];
    var found = false;
    for (var i = 0; i < cart.length; i++) {
      if (cart[i].name === p.name) {
        cart[i].qty++;
        found = true;
        break;
      }
    }
    if (!found) {
      cart.push({ name: p.name, price: p.price, qty: 1 });
    }
    updateReceipt();
  }

  // レシート・金額計算の表示更新（駄菓子屋仕様：すべて税込表示が基本）
  function updateReceipt() {
    var total = 0;
    var receiptText = "=== 駄菓子 夕やけ堂 ===\n\n";
    
    if (cart.length === 0) {
      receiptText += "  いらっしゃい！\n  なにか買うかい？\n";
    } else {
      for (var i = 0; i < cart.length; i++) {
        var subTotal = cart[i].price * cart[i].qty;
        total += subTotal;
        receiptText += cart[i].name + " x " + cart[i].qty + "\n";
        receiptText += "               " + subTotal + "円\n";
      }
    }
    
    // 駄菓子屋は基本的に「税込（内税表記）」が多いため、消費税別の表記はせずシンプルに合計金額にします
    receiptText += "---------------------\n";
    receiptText += "お会計:        " + total + "円\n";
    receiptText += "---------------------\n";

    document.getElementById("receipt").innerText = receiptText;
    document.getElementById("input-cash").innerText = currentInputCash || "0";
    return total;
  }

  // テンキー入力
  function pressNum(num) {
    currentInputCash += num.toString();
    updateReceipt();
  }

  // とりけしボタン（カートと入力をリセット）
  function clearCart() {
    cart = [];
    currentInputCash = "";
    updateReceipt();
  }

  // 会計ボタン（お釣りの計算）
  function calcTotal() {
    var grandTotal = updateReceipt();
    var cash = parseInt(currentInputCash, 10) || 0;

    if (cart.length === 0) {
      alert("お菓子が選ばれていないよ！");
      return;
    }

    if (cash < grandTotal) {
      alert("お金が足りないよ！おじいちゃん困っちゃうな。");
      return;
    }

    var change = cash - grandTotal;
    var receiptText = document.getElementById("receipt").innerText;
    
    receiptText += "だしたお金:    " + cash + "円\n";
    receiptText += "おつり:        " + change + "円\n";
    receiptText += "=====================\n";
    receiptText += "  またおいで！気をつけて帰るんだよ。\n";

    document.getElementById("receipt").innerText = receiptText;
    
    // 次のお客さんに備えて初期化
    cart = [];
    currentInputCash = "";
  }

  // お菓子の追加
  function addItem() {
    var nameInput = document.getElementById("new-name");
    var priceInput = document.getElementById("new-price");
    var name = nameInput.value.trim();
    var price = parseInt(priceInput.value, 10);

    if (!name || isNaN(price)) {
      alert("お菓子のなまえと値段をちゃんと入れてね");
      return;
    }

    var exists = false;
    for (var i = 0; i < products.length; i++) {
      if (products[i].name === name) {
        products[i].price = price;
        exists = true;
        break;
      }
    }
    if (!exists) {
      products.push({ name: name, price: price });
    }

    nameInput.value = "";
    priceInput.value = "";
    renderAll();
  }

  // お菓子の削除
  function deleteItem(index) {
    products.splice(index, 1);
    renderAll();
  }

  // 初期起動
  renderAll();
</script>

</body>
</html>
